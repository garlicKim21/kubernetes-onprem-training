apiVersion: v1
kind: Service
metadata:
  name: web-sts-svc
  labels:
    app: web-sts
spec:
  clusterIP: None
  selector:
    app: web-sts
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: web-sts
  labels:
    app: web-sts
spec:
  serviceName: web-sts-svc
  replicas: 3
  selector:
    matchLabels:
      app: web-sts
  template:
    metadata:
      labels:
        app: web-sts
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
