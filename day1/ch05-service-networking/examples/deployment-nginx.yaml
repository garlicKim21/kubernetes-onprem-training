apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-svc-demo
  labels:
    app: nginx-svc-demo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-svc-demo
  template:
    metadata:
      labels:
        app: nginx-svc-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
