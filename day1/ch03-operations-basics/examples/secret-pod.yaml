apiVersion: v1
kind: Secret
metadata:
  name: demo-secret
type: Opaque
stringData:
  username: admin
  password: "S3cur3P@ssw0rd!"
  connection-string: "postgresql://admin:S3cur3P@ssw0rd!@db.example.com:5432/myapp"
---
apiVersion: v1
kind: Pod
metadata:
  name: secret-combined-demo
spec:
  containers:
    - name: app
      image: busybox:1.37
      command: ["sh", "-c", "echo '=== 환경 변수 ===' && echo DB_USER=$DB_USER && echo '=== 마운트된 파일 ===' && ls /etc/secrets/ && echo '--- username ---' && cat /etc/secrets/username && echo '' && echo '--- password ---' && cat /etc/secrets/password && sleep 3600"]
      # 환경 변수로 주입
      env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: demo-secret
              key: username
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: demo-secret
              key: password
      # 볼륨 마운트로 파일 주입
      volumeMounts:
        - name: secret-volume
          mountPath: /etc/secrets
          readOnly: true
  volumes:
    - name: secret-volume
      secret:
        secretName: demo-secret
