apiVersion: v1
kind: Pod
metadata:
  name: probe-demo
  labels:
    purpose: probe-demo
spec:
  containers:
    - name: app
      image: nginx:1.27
      ports:
        - containerPort: 80

      # Startup Probe: 앱이 완전히 시작될 때까지 대기
      # 최대 대기 시간: failureThreshold * periodSeconds = 30 * 10 = 300초
      startupProbe:
        httpGet:
          path: /
          port: 80
        failureThreshold: 30
        periodSeconds: 10

      # Liveness Probe: 컨테이너가 살아있는지 확인
      # 실패 시 컨테이너를 재시작
      livenessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 5
        periodSeconds: 10
        failureThreshold: 3
        timeoutSeconds: 1

      # Readiness Probe: 트래픽을 받을 준비가 되었는지 확인
      # 실패 시 Service 엔드포인트에서 제거
      readinessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 5
        periodSeconds: 5
        failureThreshold: 3
        timeoutSeconds: 1
