apiVersion: v1
kind: Pod
metadata:
  name: broken-probe
spec:
  containers:
    - name: app
      image: nginx:1.27
      readinessProbe:
        httpGet:
          path: /healthz
          port: 80
        initialDelaySeconds: 3
        periodSeconds: 5
      livenessProbe:
        httpGet:
          path: /healthz
          port: 80
        initialDelaySeconds: 10
        periodSeconds: 5
