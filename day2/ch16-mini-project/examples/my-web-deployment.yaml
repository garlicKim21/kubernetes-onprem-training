# nginx Deployment вАФ ConfigMapмЭД лІИмЪінКЄнХШмЧђ мї§мК§нЕА HTML мДЬлєЩ
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-web
  template:
    metadata:
      labels:
        app: my-web
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
            - name: conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
      volumes:
        - name: html
          configMap:
            name: my-html
        - name: conf
          configMap:
            name: my-nginx-conf
