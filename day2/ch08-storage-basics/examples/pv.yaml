apiVersion: v1
kind: PersistentVolume
metadata:
  name: demo-pv
  labels:
    type: local
spec:
  capacity:
    storage: 1Gi                          # 스토리지 용량
  accessModes:
    - ReadWriteOnce                        # 단일 노드에서 읽기/쓰기
  persistentVolumeReclaimPolicy: Retain    # PVC 삭제 시 PV 유지
  storageClassName: ""                     # 빈 문자열 = 정적 프로비저닝
  hostPath:
    path: /tmp/k8s-pv-demo                 # 노드의 실제 경로
    type: DirectoryOrCreate
