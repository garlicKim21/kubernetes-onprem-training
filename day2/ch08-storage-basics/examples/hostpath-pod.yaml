apiVersion: v1
kind: Pod
metadata:
  name: hostpath-demo
  labels:
    app: hostpath-demo
spec:
  containers:
    - name: app
      image: busybox:1.37
      command: ["sh", "-c", "echo 'Hello from hostPath!' > /host-data/hello.txt && sleep 3600"]
      volumeMounts:
        - name: host-volume
          mountPath: /host-data
  volumes:
    - name: host-volume
      hostPath:
        path: /tmp/k8s-hostpath-demo    # 노드의 /tmp/k8s-hostpath-demo 경로를 마운트
        type: DirectoryOrCreate          # 디렉토리가 없으면 자동 생성
