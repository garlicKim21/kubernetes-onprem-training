---
# Headless Service: StatefulSetмқҳ Podлі„ кі мң  DNSлҘј м ңкіө
# mysql-0.mysql-svc.db-demo.svc.cluster.local нҳ•нғңлЎң м ‘к·ј к°ҖлҠҘ
apiVersion: v1
kind: Service
metadata:
  name: mysql-svc
  namespace: db-demo
  labels:
    app: mysql
spec:
  clusterIP: None          # Headless Service (ClusterIP м—ҶмқҢ)
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
      name: mysql

---
# StatefulSet: MySQL лӢЁмқј мқёмҠӨн„ҙмҠӨ л°°нҸ¬
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: db-demo
spec:
  serviceName: mysql-svc       # мң„м—җм„ң мғқм„ұн•ң Headless Service мқҙлҰ„
  replicas: 1                  # MySQL лӢЁмқј мқёмҠӨн„ҙмҠӨ
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
              name: mysql
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-root-password
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql     # MySQL лҚ°мқҙн„° м ҖмһҘ кІҪлЎң
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
                - -uroot
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 30
            periodSeconds: 10

  # volumeClaimTemplates: Podлі„ к°ңлі„ PVCлҘј мһҗлҸҷ мғқм„ұ
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes:
          - ReadWriteOnce              # лӢЁмқј л…ёл“ңм—җм„ң мқҪкё°/м“°кё°
        storageClassName: vsphere-csi  # vSphere CSI лҸҷм Ғ н”„лЎңл№„м ҖлӢқ
        resources:
          requests:
            storage: 5Gi               # 5GiB мҠӨнҶ лҰ¬м§Җ мҡ”мІӯ
