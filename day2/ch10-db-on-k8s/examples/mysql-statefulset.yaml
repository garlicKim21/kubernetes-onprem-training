# StatefulSet: MySQL 단일 인스턴스 배포
# PVC는 별도 파일(mysql-pvc.yaml)에서 미리 생성합니다
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: db-demo
spec:
  serviceName: mysql-svc       # Headless Service 이름
  replicas: 1                  # MySQL 단일 인스턴스
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
              name: mysql
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-root-password
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql     # MySQL 데이터 저장 경로
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
                - -uroot
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
                - -uroot
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-data          # 별도 생성한 PVC 참조
