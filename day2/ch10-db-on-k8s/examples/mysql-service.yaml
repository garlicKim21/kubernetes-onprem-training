# Headless Service: StatefulSetмқҳ Podлі„ кі мң  DNSлҘј м ңкіө
# mysql-0.mysql-svc.db-demo.svc.cluster.local нҳ•нғңлЎң м ‘к·ј к°ҖлҠҘ
apiVersion: v1
kind: Service
metadata:
  name: mysql-svc
  namespace: db-demo
  labels:
    app: mysql
spec:
  clusterIP: None          # Headless Service (ClusterIP м—ҶмқҢ)
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
      name: mysql
