# MySQL 데이터 영속 스토리지
# StatefulSet과 독립적으로 존재하는 PVC
# StatefulSet을 삭제해도 이 PVC와 데이터는 유지됩니다
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-data
  namespace: db-demo
spec:
  accessModes:
    - ReadWriteOnce              # 단일 노드에서 읽기/쓰기
  storageClassName: vsphere-csi  # vSphere CSI 동적 프로비저닝
  resources:
    requests:
      storage: 5Gi               # 5GiB 스토리지 요청
