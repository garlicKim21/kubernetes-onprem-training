apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dynamic-demo-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce                  # 단일 노드에서 읽기/쓰기
  resources:
    requests:
      storage: 5Gi                   # 요청 용량
  storageClassName: vsphere-csi      # StorageClass 지정 (동적 프로비저닝)
  # storageClassName을 생략하면 기본(default) StorageClass가 사용됩니다.
  # 우리 클러스터에서는 vsphere-csi가 기본 StorageClass이므로 결과는 동일합니다.
