apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nginx-demo-route
  namespace: demo
spec:
  parentRefs:
    - name: shared-gateway         # 클러스터에 설정된 Gateway 이름
      namespace: gateway-system
  hostnames:
    - "demo.basphere.dev"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: nginx-demo-svc
          port: 80
